<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manan Rohilla — Resume</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      max-width: 560px;
      width: 100%;
      text-align: center;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 0.95rem;
      color: #94a3b8;
      margin-bottom: 2.5rem;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      padding: 1.5rem 1rem;
      border: 1px solid #1e293b;
      border-radius: 12px;
      background: #1e293b;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, background 0.15s, transform 0.15s;
    }

    .card:hover {
      border-color: #4e9fe6;
      background: #1a2f4a;
      transform: translateY(-2px);
    }

    .card-icon {
      font-size: 1.8rem;
    }

    .card-label {
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .card-desc {
      font-size: 0.75rem;
      color: #64748b;
    }

    footer {
      margin-top: 2.5rem;
      font-size: 0.75rem;
      color: #475569;
    }

    footer a {
      color: #4e9fe6;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Manan Rohilla</h1>
    <p class="subtitle">Software Development Engineer &mdash; choose a resume variant</p>

    <div class="cards">
      <a class="card" href="mern.pdf" target="_blank" rel="noopener">
        <span class="card-icon">🔗</span>
        <span class="card-label">MERN Stack</span>
        <span class="card-desc">MongoDB · Express · React · Node</span>
      </a>

      <a class="card" href="backend.pdf" target="_blank" rel="noopener">
        <span class="card-icon">⚙️</span>
        <span class="card-label">Backend</span>
        <span class="card-desc">Node.js · Express · APIs</span>
      </a>

      <a class="card" href="frontend.pdf" target="_blank" rel="noopener">
        <span class="card-icon">🎨</span>
        <span class="card-label">Frontend</span>
        <span class="card-desc">React · Flutter · UI</span>
      </a>
    </div>

    <footer>
      <a href="https://github.com/MananRohilla" target="_blank" rel="noopener">GitHub</a>
      &nbsp;&middot;&nbsp;
      <a href="https://manan-portfolio-delta.vercel.app/" target="_blank" rel="noopener">Portfolio</a>
    </footer>
  </div>
</body>
</html>
